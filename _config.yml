# Citizen Steve PhD Site Configuration

title: Citizen Steve PhD
description: Evidence-based education on American democracy and constitutional governance
baseurl: ""
url: "https://citizenstevephd.com"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed

# Timezone for post scheduling
timezone: America/New_York
future: true

# Google Analytics (GA4 Measurement ID)
google_analytics: "G-VVK1MMNFFX"

# Permalink structure
permalink: /sessions/:year/:month/:day/:title/

# Exclude files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - notes
  - LEGAL-MEMO.md
  - REVISION.md
  - ROLLOUT-PLAN.md
  - README.md
  - "Header.jpg"
  - "Header With Text.jpeg"
