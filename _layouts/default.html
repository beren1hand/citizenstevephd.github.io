<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    {% if page.show_hero %}
    <header class="hero">
        <img src="/assets/images/header.jpg" alt="Citizen Steve banner" class="hero-img">
        <div class="hero-overlay"></div>
        <div class="hero-content container">
            <h1>Citizen Steve, PhD</h1>
            <p class="tagline">Evidence-based education on American democracy<br>and constitutional governance</p>
            <p class="schedule">Wednesdays, 1–2 PM @ The Oval</p>
        </div>
    </header>
    {% else %}
    <header class="compact">
        <div class="container">
            <a href="/" class="site-title">Citizen Steve, PhD</a>
        </div>
    </header>
    {% endif %}

    <main class="container">
        {{ content }}
    </main>

    <footer>
        <div class="container">
            <p>Citizen Steve, PhD | Evidence-based education for democracy</p>
        </div>
    </footer>
</body>
</html>
