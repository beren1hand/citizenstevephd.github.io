<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <header>
        <div class="container">
            <h1>🇺🇸 {{ site.title }}</h1>
            <p class="tagline">{{ site.description }}</p>
            <nav>
                <a href="{{ '/' | relative_url }}">🏛️ Home</a>
                <a href="{{ '/about' | relative_url }}">📜 About</a>
                <a href="{{ '/sessions' | relative_url }}">📚 Sessions</a>
                <a href="{{ '/resources' | relative_url }}">🔍 Resources</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {{ content }}
    </main>

    <footer>
        <div class="container">
            <p>🗽 {{ site.title }} | Evidence-based education for democracy</p>
            <p>📧 Contact: <a href="mailto:steve@citizenstevephd.com">steve@citizenstevephd.com</a></p>
        </div>
    </footer>
</body>
</html>
